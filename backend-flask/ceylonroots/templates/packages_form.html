{% extends "base.html" %}
{% block title %}{{ 'Edit' if package else 'New' }} Package — CeylonRoots Admin{% endblock %}
{% block content %}
  <div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('packages.list_packages') }}"
       class="btn btn-sm btn-outline-secondary me-3">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="fw-bold mb-0">{{ 'Edit Package' if package else 'New Package' }}</h4>
  </div>
  <div class="card shadow-sm" style="max-width: 700px">
    <div class="card-body p-4">
      <form method="POST"
            action="{{ url_for('packages.edit_package_post', id=package.id) if package else url_for('packages.create_package_post') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Title <span class="text-danger">*</span>
          </label>
          <input type="text"
                 name="title"
                 class="form-control"
                 value="{{ package.title if package else '' }}"
                 required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Description</label>
          <textarea name="description" class="form-control" rows="4">{{ package.description if package else '' }}</textarea>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              Duration (days) <span class="text-danger">*</span>
            </label>
            <input type="number"
                   name="duration_days"
                   class="form-control"
                   value="{{ package.duration_days if package else 1 }}"
                   min="1"
                   required />
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              Price (USD) <span class="text-danger">*</span>
            </label>
            <input type="number"
                   name="price"
                   class="form-control"
                   value="{{ package.price if package else 0 }}"
                   min="0"
                   step="0.01"
                   required />
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Status</label>
            <select name="status" class="form-select">
              <option value="ACTIVE"
                      {% if package and package.status == 'ACTIVE' %}selected{% endif %}>Active</option>
              <option value="DRAFT"
                      {% if package and package.status == 'DRAFT' %}selected{% endif %}>Draft</option>
              <option value="ARCHIVED"
                      {% if package and package.status == 'ARCHIVED' %}selected{% endif %}>Archived</option>
            </select>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Image URL</label>
          <input type="url"
                 name="image_url"
                 class="form-control"
                 value="{{ package.image_url if package else '' }}" />
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">{{ 'Save changes' if package else 'Create package' }}</button>
          <a href="{{ url_for('packages.list_packages') }}"
             class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
